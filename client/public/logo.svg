<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#1a1a1a"/>

  <!-- Z path: top-left → top-right (node) → bottom-left (node) → bottom-right -->
  <polyline
    points="18,23 82,23 18,77 82,77"
    fill="none"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Node 1: top-right — where diagonal begins -->
  <circle cx="82" cy="23" r="9" fill="white"/>
  <circle cx="82" cy="23" r="3.5" fill="#1a1a1a"/>

  <!-- Node 2: bottom-left — where diagonal ends -->
  <circle cx="18" cy="77" r="9" fill="white"/>
  <circle cx="18" cy="77" r="3.5" fill="#1a1a1a"/>
</svg>
